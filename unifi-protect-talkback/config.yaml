---
name: "UniFi Protect Doorbell"
description: >-
  Weboberfläche für UniFi Protect G4/G5 Doorbells.
  Verbindung mit der UniFi Protect Console (UDM Pro, CloudKey, UNVR) —
  die Türklingel wird automatisch erkannt.
  Livebild (HLS), Talkback, Klingelton-Steuerung, Display-Nachrichten.
version: "1.2.1"
slug: "unifi_protect_doorbell"
init: false
startup: "application"
boot: "auto"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Weboberfläche"

map:
  - ssl:ro

options:
  unifi_host: ""
  unifi_port: 443
  unifi_username: ""
  unifi_password: ""
  doorbell_name: ""
  doorbell_mac: ""
  unifi_camera_id: ""
  ssl_verify: false
  web_port: 8080
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  log_level: "info"

schema:
  unifi_host: str
  unifi_port: "int(1,65535)"
  unifi_username: str
  unifi_password: password
  doorbell_name: str?
  doorbell_mac: str?
  unifi_camera_id: str?
  ssl_verify: bool?
  web_port: "int(1,65535)"
  ssl: bool
  certfile: str
  keyfile: str
  log_level: "list(debug|info|warning|error)"

url: "https://github.com/choell401780/unifi-protect-talkback-ha"
