---
name: "UniFi Protect Doorbell"
description: >-
  Weboberfläche für UniFi Protect G4/G5 Doorbells.
  Verbindung mit der UniFi Protect Console (UDM Pro, CloudKey, UNVR) —
  die Türklingel wird automatisch erkannt.
  Livebild (HLS), Talkback, Klingelton-Steuerung, Display-Nachrichten.
version: "1.3.0"
slug: "unifi_protect_doorbell"
init: false
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8080
ingress_stream: true
panel_icon: "mdi:doorbell-video"
panel_title: "Türklingel"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

# Direct port exposure is OFF by default — access goes through Home Assistant
# Ingress (sidebar). Users can opt in by setting the host port in the
# add-on's "Network" tab if they need direct LAN access (mind: no auth then).
ports:
  8080/tcp: null
ports_description:
  8080/tcp: "Optional: only set if direct LAN access is required (bypasses Home Assistant authentication)"

map:
  - ssl:ro

options:
  unifi_host: ""
  unifi_port: 443
  unifi_username: ""
  unifi_password: ""
  doorbell_name: ""
  doorbell_mac: ""
  unifi_camera_id: ""
  ssl_verify: false
  web_port: 8080
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  log_level: "info"

schema:
  unifi_host: str
  unifi_port: "int(1,65535)"
  unifi_username: str
  unifi_password: password
  doorbell_name: str?
  doorbell_mac: str?
  unifi_camera_id: str?
  ssl_verify: bool?
  web_port: "int(1,65535)"
  ssl: bool
  certfile: str
  keyfile: str
  log_level: "list(debug|info|warning|error)"

url: "https://github.com/choell401780/unifi-protect-talkback-ha"
