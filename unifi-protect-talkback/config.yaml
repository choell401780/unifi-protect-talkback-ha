---
name: "UniFi Protect Doorbell"
description: >-
  Weboberfläche für UniFi Protect G4/G5 Doorbells:
  Livebild (HLS), Talkback, Klingelton-Steuerung, Display-Nachrichten.
version: "1.1.0"
slug: "unifi_protect_doorbell"
init: false
startup: "application"
boot: "auto"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

# Weboberfläche direkt erreichbar (ohne Ingress) — port null = User wählt
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Weboberfläche"

# HA-SSL-Zertifikat einbinden (wird benötigt wenn ssl: true)
map:
  - ssl:ro

options:
  unifi_host: ""
  unifi_port: 443
  unifi_username: ""
  unifi_password: ""
  unifi_camera_id: ""
  web_port: 8080
  ssl: false
  certfile: "fullchain.pem"
  keyfile: "privkey.pem"
  log_level: "info"

schema:
  unifi_host: str
  unifi_port: "int(1,65535)"
  unifi_username: str
  unifi_password: password
  unifi_camera_id: str
  web_port: "int(1,65535)"
  ssl: bool
  certfile: str
  keyfile: str
  log_level: "list(debug|info|warning|error)"

url: "https://github.com/choell401780/unifi-protect-talkback-ha"
